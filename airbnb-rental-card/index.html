<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
    <style type="text/tailwindcss">
      @theme {
        --font-heading: "DM Serif Display", sans-serif;
        --font-body: "Instrument Sans", sans-serif;
        --color-background: #0a0a0b;
        --color-surface: #111113;
        --color-primary: #f4f4f5;
        --color-secondary: #a1a1aa;
        --color-muted: #71717a;
        --color-CTA: #8b5cf6;
        --color-success: #10b981;
        --color-rating: #fbbf24;
        --color-border: rgba(255, 255, 255, 0.06);
      }
    </style>
  </head>
  <body>
    <div class="bg-background h-screen flex justify-center items-center">
      <div class="w-[320px] overflow-hidden rounded-xl border border-border">
        <div class="relative">
          <div class="absolute top-4 left-4 rounded-full bg-surface/60 flex items-center gap-x-1.5 py-1 px-2 z-10">
            <div class="rounded-full size-1.5 bg-success"></div>
            <p class="text-primary font-bold text-[10px] tracking-wider">Available this week</p>
          </div>
          <button class="absolute top-4 right-4 rounded-full bg-surface/60 p-1.5 group z-10 cursor-pointer">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              class="text-primary size-3.5 stroke-2 fill-none group-hover:fill-primary transition-colors"
              stroke="currentColor"
            >
              <path
                d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"
              />
            </svg>
          </button>
          <img
            src="https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=800&q=80"
            alt="Preview"
            class="rounded-t-2xl object-cover w-full h-full"
            draggable="false"
          />
          <div class="absolute inset-x-0 bottom-0 h-18 bg-gradient-to-t from-surface to-transparent"></div>
        </div>
        <div class="p-5 bg-surface space-y-4">
          <div>
            <div class="flex items-center justify-between">
              <h1 class="font-heading text-primary text-xl text-[23px]">Villa Serena</h1>
              <div class="flex items-center gap-x-1">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-star-icon lucide-star fill-rating size-4"
                >
                  <path
                    d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"
                  />
                </svg>
                <p class="text-primary text-usm font-body font-bold">4.97</p>
                <p class="text-muted text-xs font-body">(128)</p>
              </div>
            </div>
            <div class="flex items-center gap-x-1.5">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-map-pin text-secondary size-4"
              >
                <path
                  d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"
                />
                <circle cx="12" cy="10" r="3" />
              </svg>
              <p class="font-body text-secondary text-[14px]">Amalfi Coast, italy</p>
            </div>
          </div>
          <hr class="bg-border text-border" />
          <div
            class="flex items-center gap-x-2 overflow-x-auto [&>div]:flex [&>div]:items-center [&>div]:gap-x-1.5 [&>div]:shrink-0 [&>div]:border [&>div]:border-border [&>div]:rounded-full [&>div]:py-1.5 [&>div]:px-2 [&_p]:text-secondary [&_p]:text-xs [&_p]:font-medium [&_svg]:fill-none [&_svg]:stroke-2 [&_svg]:text-secondary [&_svg]:size-3"
          >
            <div>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke="currentColor">
                <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8" />
                <path
                  d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
                />
              </svg>
              <p>3 Beds</p>
            </div>
            <div>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke="currentColor">
                <path d="M10 16h.01" />
                <path
                  d="M2.212 11.577a2 2 0 0 0-.212.896V18a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-5.527a2 2 0 0 0-.212-.896L18.55 5.11A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"
                />
                <path d="M21.946 12.013H2.054" />
                <path d="M6 16h.01" />
              </svg>
              <p>2 Bath</p>
            </div>
            <div>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke="currentColor">
                <rect width="20" height="14" x="2" y="3" rx="2" />
                <line x1="8" x2="16" y1="21" y2="21" />
                <line x1="12" x2="12" y1="17" y2="21" />
              </svg>
              <p>Sea View</p>
            </div>
            <div>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke="currentColor">
                <path
                  d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"
                />
              </svg>
              <p>Pool</p>
            </div>
            <div>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke="currentColor">
                <path d="M12 20h.01" />
                <path d="M2 8.82a15 15 0 0 1 20 0" />
                <path d="M5 12.859a10 10 0 0 1 14 0" />
                <path d="M8.5 16.429a5 5 0 0 1 7 0" />
              </svg>
              <p>WiFi</p>
            </div>
          </div>
          <hr class="bg-border text-border" />
          <div>
            <p class="text-muted text-[14px] font-body">Starting at</p>
            <div class="flex items-end gap-x-2">
              <p class="text-primary font-bold font-body">$2,450</p>
              <p class="text-muted text-[14px] font-body">/ week</p>
              <div class="rounded-full bg-success/14 py-1 px-2">
                <p class="text-xs text-success font-semibold font-body">Free cancellation</p>
              </div>
            </div>
          </div>
          <button
            class="font-body text-primary text-center w-full bg-CTA/70 rounded-xl py-2 text-[15px] font-bold cursor-pointer"
          >
            Reserve this day ->
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
